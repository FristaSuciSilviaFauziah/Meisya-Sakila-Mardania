<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frista Birthday</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Opening -->
<div class="opening" id="opening">
  <h1>🎉 Birthday Party 🎉</h1>
  <p>Special Day for Meisya</p>
  <button onclick="openInvite()">Open Invitation</button>
</div>

<!-- Main Content -->
<div class="container hidden" id="main">

  <section class="card fade">
    <h2>You're Invited 💌</h2>
    <p>Join my birthday party!</p>
  </section>

  <section class="card fade">
    <h3>📅 Date</h3>
    <p>27 May 2026</p>
    <h3>📍 Location</h3>
    <p>My Sweet Party Place</p>
  </section>

  <section class="card fade">
    <h3>Gallery 📸</h3>
    <div class="gallery">
      <img src="https://picsum.photos/300/200?1">
      <img src="https://picsum.photos/300/200?2">
      <img src="https://picsum.photos/300/200?3">
    </div>
  </section>

  <section class="card fade">
    <h3>Message 💖</h3>
    <p>Hope you can come and celebrate this special day with me ✨</p>
  </section>

</div>

<!-- Musik -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
